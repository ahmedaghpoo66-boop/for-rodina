<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة جداً ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #150030, #050015); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; text-align: center; direction: rtl; }
        
        /* شاشة القفل */
        .lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 10; width: 100%; max-width: 400px; }
        .lock-screen h2 { font-size: 2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .lock-screen p { color: #b3b3b3; font-size: 0.9rem; margin-bottom: 30px; }
        .input-box { width: 100%; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; color: white; font-size: 1.2rem; text-align: center; letter-spacing: 2px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #ff2a74; box-shadow: 0 0 15px rgba(255, 42, 116, 0.4); }
        .btn { background: #ff2a74; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #e01e5f; transform: scale(1.02); }
        .error-msg { color: #ff4a4a; margin-top: 10px; font-size: 0.9rem; display: none; }

        /* شاشة المفاجأة */
        .content-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 10; animation: fadeIn 1.5s ease-in-out forwards; width: 100%; max-width: 500px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .main-title { font-size: 3.5rem; letter-spacing: 2px; color: white; text-transform: uppercase; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,255,255,0.6); }
        .sub-text { font-size: 1.3rem; line-height: 1.6; margin-bottom: 30px; color: #ffccd5; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-title { font-size: 1.2rem; margin-bottom: 15px; color: #ff4a8d; }
        .date-box { background: #000; border: 2px solid #ff2a74; padding: 12px; border-radius: 30px; font-size: 1.4rem; font-weight: bold; display: inline-block; padding-left: 25px; padding-right: 25px; letter-spacing: 1px; box-shadow: 0 0 15px rgba(255, 42, 116, 0.3); direction: ltr; }

        /* تأثير القلوب */
        .heart { position: absolute; color: #ff2a74; font-size: 1.5rem; pointer-events: none; animation: fall linear infinite; top: -10%; opacity: 0.7; }
        @keyframes fall {
            to { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="lock-screen" id="lockScreen">
        <h2>جاهزة؟ 🤔</h2>
        <p>كل اللي هنا هيفضل بيني وبينك طول العمر ❤️</p>
        <input type="password" class="input-box" id="passwordInput" placeholder="اكتبي الباسورد هنا...">
        <button class="btn" onclick="checkPassword()">يلا بسرعة افتحي 😂❤️</button>
        <p class="error-msg" id="errorMsg">الباسورد غلط، ركزي وافتكري الكلمة السرية! 😉</p>
    </div>

    <div class="content-screen" id="contentScreen">
        <h1 class="main-title">Rodina</h1> 
        <p class="sub-text">يوم ما عرفنا بعض كان يوم ولادتي ❤️</p>
        
        <div class="card">
            <p class="card-title">❤️ اليوم اللي نور حياتي (ارتبطنا)</p>
            <div class="date-box">2026-04-30</div> 
        </div>
    </div>

    <script {timestamp}>
        // الباسورد هو كلمة love بالصغير، تقدر تغيرها من هنا لو تحب
        const CORRECT_PASSWORD = "love"; 

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('errorMsg');
            
            if(input.toLowerCase() === CORRECT_PASSWORD.toLowerCase()) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('contentScreen').style.display = 'flex';
                setInterval(createHeart, 300);
            } else {
                error.style.display = 'block';
                document.getElementById('passwordInput').style.transform = 'translateX(10px)';
                setTimeout(() => document.getElementById('passwordInput').style.transform = 'translateX(0)', 100);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
